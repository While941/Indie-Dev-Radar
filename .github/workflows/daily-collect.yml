name: daily-collect

# Collects intelligence, scores with AI, builds 日贴 (optional 周贴), exports
# copy-ready HTML, and pushes to Feishu for archive. Human publishes manually.
# Daily at Beijing 09:00 (UTC 01:00); Monday also builds 周贴.

on:
  schedule:
    - cron: "0 1 * * *"          # UTC 01:00 == Beijing 09:00 daily
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no Feishu push)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      weekly:
        description: "Also generate 周贴"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read

concurrency:
  group: daily-collect
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          # Monday UTC after cron, or manual weekly flag
          DOW=$(date -u +%u)
          if [ "${{ github.event.inputs.weekly }}" = "true" ] || [ "$DOW" = "1" ]; then
            ARGS="$ARGS --weekly"
          fi
          python pipeline.py $ARGS
      - name: Upload digest HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digests
          path: output/
          if-no-files-found: ignore
