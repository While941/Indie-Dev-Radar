name: daily-collect

# Collects intelligence, scores with AI, builds 日贴/AI日贴 (and weekly variants),
# exports copy-ready HTML, and pushes to Feishu for archive. Human publishes manually.
#
# Schedules (Asia/Shanghai = UTC+8, no DST):
#   - Daily 10:00 Beijing  → UTC 02:00  → 日贴 + AI日贴
#   - Friday 16:00 Beijing → UTC 08:00  → 周贴 + AI周贴 only (--weekly --weekly-only)
# Note: GitHub Actions free-tier schedules may drift by several minutes.

on:
  schedule:
    - cron: "0 2 * * *"          # UTC 02:00 == Beijing 10:00 daily
    - cron: "0 8 * * 5"          # UTC 08:00 Fri == Beijing 16:00 weekly
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no Feishu push)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      weekly:
        description: "Weekly-only run (周贴 + AI周贴, skip daily digests)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read

concurrency:
  group: daily-collect
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          # Friday 08:00 UTC schedule, or manual weekly flag → weekly-only
          DOW=$(date -u +%u)
          HOUR=$(date -u +%H)
          if [ "${{ github.event.inputs.weekly }}" = "true" ] || { [ "$DOW" = "5" ] && [ "$HOUR" = "08" ]; }; then
            ARGS="$ARGS --weekly --weekly-only"
          fi
          python pipeline.py $ARGS
      - name: Upload digest HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digests
          path: output/
          if-no-files-found: ignore
