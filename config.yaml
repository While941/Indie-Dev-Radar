# Indie-Dev-Radar configuration. Non-secret structure lives here.
# Secret values are referenced as ${VAR} and expanded from environment / .env.

sources:
  github:
    enabled: true
    # Base keyword query; collector appends rolling pushed:> / created:> and stars:>.
    query: "godot OR gamedev OR roguelike OR indie-game OR pixel-art OR aseprite"
    pushed_within_days: 3
    max_age_days: 3                 # hard drop older than this (0 = off)
    freshness_horizon_days: 3       # calendar freshness unit horizon
    min_stars: 50
    per_page: 30
    # Multi-path: same keywords, different rankings → merge by URL.
    # stars+updated share one corroboration family; created is orthogonal.
    path_sorts: ["stars", "updated"]
    created_within_days: 7

  github_ai:
    enabled: true
    query: >-
      (llm OR "language model" OR "stable diffusion" OR comfyui
      OR "text-to-image" OR "procedural generation" OR "npc dialogue"
      OR "ai agent" OR "game ai")
      (game OR gamedev OR godot OR unity OR unreal OR "indie game")
    pushed_within_days: 3
    max_age_days: 3
    freshness_horizon_days: 3
    min_stars: 30
    per_page: 30
    path_sorts: ["stars", "updated"]
    created_within_days: 7

  hackernews:
    enabled: true
    lists: ["topstories", "showstories"]
    top_n: 30
    max_age_days: 2
    freshness_horizon_days: 2
    require_topic_match: true
    # topic_keywords: []   # optional override; empty → built-in list

  godot:
    enabled: true
    godot_version: "4.x"
    sorts: ["updated", "new", "rating"]
    max_results: 30
    max_age_days: 3
    freshness_horizon_days: 3

scoring:
  # Positive dims + path_corroboration (from multi-path) + risk deduction.
  # Final score always = compute_score(dimensions, weights) after anchoring
  # freshness + path_corroboration from DiscoverySignals.
  weights:
    relevance: 0.28
    utility: 0.22
    freshness: 0.15
    popularity: 0.10
    differentiation: 0.08
    biz_value: 0.07
    path_corroboration: 0.10
    risk: 0.10
  score_threshold: 70

max_items_per_run: 40

digest:
  daily_enabled: true
  weekly_enabled: false
  ai_daily_enabled: true
  ai_weekly_enabled: true
  max_items_daily: 8
  max_items_weekly: 15
  max_items_ai_daily: 6
  max_items_ai_weekly: 12
  weekly_lookback_days: 7
  rewrite_per_item: false
  output_dir: "output"

ai:
  base_url: "https://api.deepseek.com"
  cheap_model: "deepseek-chat"
  strong_model: "deepseek-chat"
  temperature: 0.2
  timeout_seconds: 90

feishu:
  app_token: "${FEISHU_APP_TOKEN}"
  table_id: "${FEISHU_TABLE_ID}"
  dedup_lookback_days: 14
